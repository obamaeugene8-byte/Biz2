<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body { font-family: Arial; background:#f4f6f9; padding:20px; }
        h2 { text-align:center; }

        .nav { text-align:center; margin-bottom:20px; }
        .nav a {
            padding:10px 15px;
            margin:5px;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        .users { background:#007bff; }
        .tasks { background:#28a745; }
        .logout { background:#dc3545; }

        table {
            width:100%;
            border-collapse: collapse;
            background:white;
            border-radius:10px;
            overflow:hidden;
        }

        th { background:#333; color:white; padding:10px; }
        td { padding:10px; text-align:center; }

        tr:nth-child(even) { background:#f2f2f2; }

        .green { color:green; font-weight:bold; }
        .orange { color:orange; font-weight:bold; }
        .red { color:red; font-weight:bold; }
    </style>
</head>

<body>

<h2>📊 Workload Dashboard</h2>

<div class="nav">
    <a href="/users" class="users">Users</a>
    <a href="/tasks" class="tasks">Tasks</a>
    <a href="/logout" class="logout">Logout</a>
</div>

<table>
    <tr>
        <th>Name</th>
        <th>Tasks</th>
        <th>Hours</th>
        <th>Capacity</th>
        <th>Load %</th>
    </tr>

    {% for u in data %}
    <tr>
        <td>{{ u.name }}</td>
        <td>{{ u.tasks }}</td>
        <td>{{ u.hours }}</td>
        <td>{{ u.capacity }}</td>
        <td>
            {% if u.load > 100 %}
                <span class="red">{{ u.load }}</span>
            {% elif u.load > 70 %}
                <span class="orange">{{ u.load }}</span>
            {% else %}
                <span class="green">{{ u.load }}</span>
            {% endif %}
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
