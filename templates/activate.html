<!DOCTYPE html>
<html>
<head>
    <title>Activate</title>

    <style>
        body {
            font-family: Arial;
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box {
            background:white;
            padding:30px;
            border-radius:10px;
            text-align:center;
            width:300px;
        }

        input, button {
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button {
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover { background:#0056b3; }
    </style>
</head>

<body>

<div class="box">
    <h2>🔐 Enter Access Code</h2>

    <form method="POST">
        <input name="code" placeholder="License code" required>
        <button type="submit">Activate</button>
    </form>
</div>

</body>
</html>
