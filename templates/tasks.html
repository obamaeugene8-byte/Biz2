<!DOCTYPE html>
<html>
<head>
    <title>Tasks</title>

    <style>
        body {
            font-family: Arial;
            background:#f4f6f9;
            padding:20px;
        }

        h2 { text-align:center; }

        .nav {
            text-align:center;
            margin-bottom:20px;
        }

        .nav a {
            padding:10px;
            margin:5px;
            color:white;
            text-decoration:none;
            border-radius:5px;
            display:inline-block;
        }

        .dashboard { background:#007bff; }
        .users { background:#28a745; }
        .logout { background:#dc3545; }

        .container {
            max-width:600px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        input, select, button {
            width:100%;
            padding:10px;
            margin-bottom:10px;
        }

        button {
            background:#28a745;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover { background:#218838; }

        li {
            background:#f2f2f2;
            padding:10px;
            margin-bottom:5px;
            border-radius:5px;
        }
    </style>
</head>

<body>

<h2>📌 Tasks</h2>

<div class="nav">

    <!-- 🔥 TOKEN MUST BE PASSED -->
    <a href="/portal/{{ token }}" class="dashboard">Dashboard</a>
    <a href="/users/{{ token }}" class="users">Users</a>
    <a href="/logout" class="logout">Logout</a>

</div>

<div class="container">

<form method="POST">
    <input name="title" placeholder="Task title" required>
    <input name="hours" placeholder="Hours" required>

    <select name="user_id" required>
        <option disabled selected>Select user</option>
        {% for u in users %}
        <option value="{{ u.id }}">{{ u.name }}</option>
        {% endfor %}
    </select>

    <button type="submit">Add Task</button>
</form>

<hr>

<ul>
{% for t in tasks %}
<li>{{ t.title }} - {{ t.estimated_hours }} hrs</li>
{% endfor %}
</ul>

</div>

</body>
</html>
