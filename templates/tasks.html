<!DOCTYPE html>
<html>
<head>
    <title>Tasks</title>

    <style>
        body { font-family: Arial; background:#f4f6f9; padding:20px; }
        h2 { text-align:center; }

        .nav { text-align:center; margin-bottom:20px; }
        .nav a {
            padding:10px 15px;
            margin:5px;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        .dashboard { background:#007bff; }
        .users { background:#28a745; }

        .container {
            max-width:600px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        input, select, button {
            width:100%;
            padding:10px;
            margin-bottom:10px;
        }

        button {
            background:#28a745;
            color:white;
            border:none;
        }

        li {
            background:#f2f2f2;
            padding:10px;
            margin-bottom:5px;
            border-radius:5px;
        }
    </style>
</head>

<body>

<h2>📌 Tasks</h2>

<div class="nav">
    <a href="/" class="dashboard">Dashboard</a>
    <a href="/users" class="users">Users</a>
</div>

<div class="container">

<form method="POST">
    <input name="title" placeholder="Task title" required>
    <input name="hours" placeholder="Hours" required>

    <select name="user_id" required>
        <option disabled selected>Select user</option>
        {% for u in users %}
        <option value="{{ u.id }}">{{ u.name }}</option>
        {% endfor %}
    </select>

    <button type="submit">Add Task</button>
</form>

<ul>
{% for t in tasks %}
    <li>{{ t.title }} - {{ t.estimated_hours }} hrs</li>
{% endfor %}
</ul>

</div>

</body>
</html>
