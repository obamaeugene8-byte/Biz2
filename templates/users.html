<!DOCTYPE html>
<html>
<head>
    <title>Users</title>

    <style>
        body {
            font-family: Arial;
            background:#f4f6f9;
            padding:20px;
        }

        h2 { text-align:center; }

        .nav {
            text-align:center;
            margin-bottom:20px;
        }

        .nav a {
            padding:10px;
            margin:5px;
            color:white;
            text-decoration:none;
            border-radius:5px;
            display:inline-block;
        }

        .dashboard { background:#007bff; }
        .tasks { background:#28a745; }
        .logout { background:#dc3545; }

        .container {
            max-width:600px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        input, button {
            width:100%;
            padding:10px;
            margin-bottom:10px;
        }

        button {
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover { background:#0056b3; }

        li {
            background:#f2f2f2;
            padding:10px;
            margin-bottom:5px;
            border-radius:5px;
        }
    </style>
</head>

<body>

<h2>👥 Users</h2>

<div class="nav">

    <!-- 🔥 TOKEN MUST BE PASSED -->
    <a href="/portal/{{ token }}" class="dashboard">Dashboard</a>
    <a href="/tasks/{{ token }}" class="tasks">Tasks</a>
    <a href="/logout" class="logout">Logout</a>

</div>

<div class="container">

<form method="POST">
    <input name="name" placeholder="Name" required>
    <input name="capacity" placeholder="Weekly Capacity" required>
    <button type="submit">Add User</button>
</form>

<hr>

<ul>
{% for u in users %}
<li>{{ u.name }} - {{ u.weekly_capacity }} hrs/week</li>
{% endfor %}
</ul>

</div>

</body>
</html>
